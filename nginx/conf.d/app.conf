# =============================================================================
# nginx/conf.d/app.conf — FASE 2: Produção com HTTPS + Headers de segurança
# =============================================================================
#
# Ative este arquivo APÓS obter o certificado SSL com Certbot.
# Remova init.conf e coloque apenas este arquivo em nginx/conf.d/
# Depois: docker compose exec nginx nginx -s reload
# =============================================================================

# ── Configurações SSL compartilhadas ─────────────────────────────────────────
ssl_protocols             TLSv1.2 TLSv1.3;
ssl_ciphers               ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       10m;
ssl_session_tickets       off;

# ── Rate limiting: protege a API de abuso ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=60r/m;

# =============================================================================
# App principal — meufinup.com.br
# =============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name meufinup.com.br www.meufinup.com.br;

    # Challenge Certbot mantido (renovação automática usa webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl;
    http2 on;
    server_name meufinup.com.br www.meufinup.com.br;

    ssl_certificate     /etc/letsencrypt/live/meufinup.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meufinup.com.br/privkey.pem;

    # ── Headers de segurança ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"    always;
    add_header X-XSS-Protection          "1; mode=block"                               always;

    # Remover header que expõe versão do Nginx
    server_tokens off;

    # ── Tamanho máximo de upload (PDFs, planilhas) ───────────────────────────
    client_max_body_size 50M;

    # ── Compressão ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Resolver Docker interno (resolve nomes de serviço em runtime) ─────────
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── API Backend (FastAPI) ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        set $backend http://backend:8000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Esconder headers internos do backend
        proxy_hide_header X-Powered-By;
    }

    # ── Assets Next.js — cache longo (hash no filename) ──────────────────────
    location /_next/static/ {
        set $frontend http://frontend-app:3000;
        proxy_pass $frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Frontend App (Next.js) ────────────────────────────────────────────────
    location / {
        limit_req zone=app_limit burst=30 nodelay;

        set $frontend http://frontend-app:3000;
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# =============================================================================
# Admin panel — admin.meufinup.com.br
# =============================================================================

server {
    listen 80;
    server_name admin.meufinup.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.meufinup.com.br;

    ssl_certificate     /etc/letsencrypt/live/admin.meufinup.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.meufinup.com.br/privkey.pem;

    # Headers de segurança (mais restritivos para admin)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "no-referrer"                                   always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
    add_header X-XSS-Protection          "1; mode=block"                                always;

    server_tokens off;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting mais restrito para o admin
    limit_req zone=api_limit burst=10 nodelay;

    # ── Resolver Docker interno ───────────────────────────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /_next/static/ {
        set $admin http://frontend-admin:3000;
        proxy_pass $admin;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        set $admin http://frontend-admin:3000;
        proxy_pass         $admin;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
