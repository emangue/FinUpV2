# =============================================================================
# nginx/conf.d/init.conf — FASE 1: HTTP apenas (para obter certificado SSL)
# =============================================================================
#
# USO:
#   1. Coloque APENAS este arquivo em nginx/conf.d/ (remova app.conf se existir)
#   2. Suba o Nginx: docker compose -f docker-compose.prod.yml up -d nginx
#   3. Obtenha o certificado (veja README de deploy)
#   4. Depois substitua este arquivo por app.conf
# =============================================================================

server {
    listen 80;
    server_name meufinup.com.br www.meufinup.com.br;

    # Challenge do Certbot (ACME webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Servir o app em HTTP temporariamente (antes do SSL)
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://frontend-app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Admin panel (HTTP — temporário)
server {
    listen 80;
    server_name admin.meufinup.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass         http://frontend-admin:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
