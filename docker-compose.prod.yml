# =============================================================================
# docker-compose.prod.yml — FinUp PRODUÇÃO
# =============================================================================
#
# Arquitetura:
#   - Nginx containerizado (únicos com ports expostos: 80 e 443)
#   - Backend sem porta exposta (acessível apenas via Nginx internamente)
#   - Frontends sem porta exposta (acessíveis apenas via Nginx internamente)
#   - PostgreSQL e Redis sem porta exposta (rede Docker interna)
#   - migrate: roda alembic upgrade head ANTES do backend subir
#   - Certbot: renova SSL automaticamente via cron
#
# Deploy automático:
#   GitHub Actions → ghcr.io → docker compose pull → up -d --no-deps
#
# Primeiro deploy (build local):
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Deploy normal (imagens do registry):
#   IMAGE_TAG=abc1234 docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# =============================================================================

networks:
  finup-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_backups:
    driver: local
  nginx_logs:
    driver: local

services:

  # ============================================================
  # PostgreSQL 16 — Banco de dados
  # SEM porta exposta: acesso apenas via rede Docker interna
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: finup_postgres_prod
    restart: unless-stopped
    networks: [finup-net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ============================================================
  # Redis 7 — Cache e sessões
  # SEM porta exposta: acesso apenas via rede Docker interna
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: finup_redis_prod
    restart: unless-stopped
    networks: [finup-net]
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # migrate — Roda alembic upgrade head e para
  # Executa ANTES do backend subir (depends_on condicional)
  # ============================================================
  migrate:
    # Usa a mesma imagem do backend (build local ou registry)
    image: ${GHCR_IMAGE_BACKEND:-}
    build:
      context: ./app_dev/backend
      dockerfile: Dockerfile
    container_name: finup_migrate
    networks: [finup-net]
    command: alembic upgrade head
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ============================================================
  # Backend — FastAPI (produção, sem --reload)
  # SEM porta exposta: acesso apenas via Nginx interno
  # ============================================================
  backend:
    image: ${GHCR_IMAGE_BACKEND:-}
    build:
      context: ./app_dev/backend
      dockerfile: Dockerfile
    container_name: finup_backend_prod
    restart: unless-stopped
    networks: [finup-net]
    env_file: .env.prod
    volumes:
      - backend_uploads:/app/uploads
      - backend_backups:/app/database/backups_daily
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================================
  # Frontend App — Next.js (usuário final)
  # SEM porta exposta: acesso apenas via Nginx interno
  # ============================================================
  frontend-app:
    image: ${GHCR_IMAGE_FRONTEND:-}
    build:
      context: ./app_dev/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    container_name: finup_frontend_app_prod
    restart: unless-stopped
    networks: [finup-net]
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================================
  # Frontend Admin — Next.js (painel administrativo)
  # SEM porta exposta: acesso apenas via Nginx interno
  # ============================================================
  frontend-admin:
    image: ${GHCR_IMAGE_ADMIN:-}
    build:
      context: ./app_admin/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    container_name: finup_frontend_admin_prod
    restart: unless-stopped
    networks: [finup-net]
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy

  # ============================================================
  # Nginx — Proxy reverso + SSL termination
  # ÚNICO serviço com portas expostas: 80 e 443
  # ============================================================
  nginx:
    image: nginx:stable-alpine
    container_name: finup_nginx_prod
    restart: unless-stopped
    networks: [finup-net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend-app
      - frontend-admin
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Certbot — Renovação automática de certificados SSL
  # Roda em background e renova a cada 12h se necessário
  # ============================================================
  certbot:
    image: certbot/certbot:latest
    container_name: finup_certbot
    # network_mode: host — necessário pois Docker containers neste VPS
    # não têm roteamento de saída via NAT. O certbot precisa de HTTPS
    # para contatar o Let's Encrypt e renovar os certificados.
    network_mode: host
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet --webroot --webroot-path=/var/www/certbot;
          sleep 12h & wait $${!};
        done"
